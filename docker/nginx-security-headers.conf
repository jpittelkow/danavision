# Shared security headers — included in server and location blocks.
# nginx's add_header in a location block replaces all parent-level
# add_header directives, so this file must be included in every
# location block that uses add_header.
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), publickey-credentials-get=(self), publickey-credentials-create=(self)" always;
# HSTS is only meaningful over HTTPS. When behind a TLS-terminating reverse proxy,
# set the X-Forwarded-Proto header and add HSTS at the proxy level instead.
# Uncomment the line below if this container serves HTTPS directly:
# add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'self'; object-src 'none'; base-uri 'self';" always;
